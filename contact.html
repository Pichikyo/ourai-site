<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTACT｜往来 - お問い合わせ</title>
<link rel="stylesheet" href="style.css">
<style>
.form{max-width:640px;background:var(--white);border-radius:14px;padding:48px 44px;margin-top:8px}
.form label{display:block;font-size:13px;font-weight:700;margin:26px 0 8px}
.form label .req{color:var(--purple);font-size:11px;margin-left:8px}
.form input,.form select,.form textarea{width:100%;font-family:var(--font);font-size:15px;padding:13px 16px;border:1px solid var(--line);border-radius:8px;background:var(--bg-2);transition:border-color .2s}
.form input:focus,.form select:focus,.form textarea:focus{outline:none;border-color:var(--blue);background:var(--white)}
.form textarea{min-height:160px;resize:vertical}
.form button{margin-top:36px;width:100%;background:linear-gradient(120deg,var(--blue),var(--purple));color:#fff;font-family:var(--font);font-weight:700;font-size:16px;border:none;border-radius:99px;padding:18px;cursor:pointer;transition:opacity .2s}
.form button:hover{opacity:.85}
.form .note{font-size:12px;color:var(--text-3);margin-top:16px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="nav">
    <a class="logo" href="index.html"><img src="https:assets/images/logo.png" alt="往来 OURAI" style="height:34px;display:block"></a>
    <nav><ul>
      <li><a href="about.html">ABOUT</a></li>
      <li><a href="service.html">SERVICE</a></li>
      <li><a href="case.html">CASE</a></li>
      <li><a href="news.html">NEWS</a></li>
    </ul></nav>
    <a class="btn-dl" href="#">資料DL</a>
    <a class="btn-mail" href="contact.html">✉</a>
  </div>
</header>

<main>

<div class="page-hero">
  <div class="wrap">
    <div class="sec-label">CONTACT</div>
    <h1 class="page-title">お問い合わせ</h1>
    <p class="lead">案件のご相談、お見積もり、資料のご請求など、お気軽にご連絡ください。通常2営業日以内にご返信いたします。</p>
  </div>
</div>

<section style="padding-top:56px">
  <div class="wrap">
    <!-- 公開時：Formspreeでフォーム作成し action のIDを差し替える -->
    <form class="form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <label>会社名・団体名<span class="req">必須</span></label>
      <input type="text" name="company" required placeholder="株式会社〇〇">

      <label>お名前<span class="req">必須</span></label>
      <input type="text" name="name" required placeholder="姓 名">

      <label>メールアドレス<span class="req">必須</span></label>
      <input type="email" name="email" required placeholder="you@example.com">

      <label>ご相談内容</label>
      <select name="category">
        <option>メタバース体験型プロモーション・戦略PR</option>
        <option>アバターファッション・バーチャルアパレル</option>
        <option>LBE（ロケーションベースドエンターテイメント）</option>
        <option>産業XRコンテンツ制作</option>
        <option>XR新規事業支援・導入サポート</option>
        <option>調査・分析 &amp; レポーティング</option>
        <option>その他</option>
      </select>

      <label>お問い合わせ内容<span class="req">必須</span></label>
      <textarea name="message" required placeholder="ご相談の概要、ご予算感、希望時期などをお書きください"></textarea>

      <button type="submit">送信する</button>
      <p class="note">いただいた情報はお問い合わせ対応の目的にのみ使用します。</p>
    </form>
  </div>
</section>

</main>

<footer>
  <div class="wrap">
    <div><img src="https:assets/images/logo.png" alt="往来 OURAI" style="height:30px;margin-bottom:16px;filter:invert(1)">株式会社 往来　〒107-0052 東京都港区赤坂9-6-30 ルイマーブル乃木坂408</div>
    <ul><li><a href="about.html">ABOUT</a></li><li><a href="service.html">SERVICE</a></li><li><a href="case.html">CASE</a></li><li><a href="news.html">NEWS</a></li></ul>
    <div class="copy">©️ OURAI Co.,Ltd.</div>
  </div>
</footer>

</body>
</html>
